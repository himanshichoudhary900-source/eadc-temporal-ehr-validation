<!DOCTYPE html>
<html>
<head>
<title>Registration Details</title>

<script type="text/javascript">
function verifyAll() {

    var university = document.forms["student"]["university"].value;
    var institute = document.forms["student"]["institute"].value;
    var mobileNo = document.forms["student"]["mobileNo"].value;
    var registerNo = document.forms["student"]["registerNo"].value;
    var cpi = document.forms["student"]["cpi"].value;
    var experience = document.forms["student"]["experience"].value;

    var namePattern = /^[A-Za-z ]+$/;
    var mobilePattern = /^[6-9][0-9]{9}$/;
    var regPattern = /^VIT[0-9]{2}[A-Z]{3}[0-9]{3}$/;

    var result = "";

    if (namePattern.test(university))
        result += "University Name is valid<br>";
    else
        result += "Invalid University Name<br>";

    if (namePattern.test(institute))
        result += "Institute Name is valid<br>";
    else
        result += "Invalid Institute Name<br>";

    if (mobilePattern.test(mobileNo))
        result += "Mobile Number is valid<br>";
    else
        result += "Invalid Mobile Number<br>";

    if (regPattern.test(registerNo))
        result += "Registration Number is valid<br>";
    else
        result += "Invalid Registration Number<br>";

    if (cpi >= 7 && cpi <= 10)
        result += "CPI is valid<br>";
    else
        result += "CPI must be between 7 and 10<br>";

    if (experience >= 2 && experience <= 20)
        result += "Experience is valid<br>";
    else
        result += "Experience must be between 2 and 20 years<br>";

    document.getElementById("output").innerHTML = result;
}
</script>
</head>

<body>
<h2>Registration Details</h2>

<form name="student">
<p>
University:
<input type="text" name="university">
</p>

<p>
Institute:
<input type="text" name="institute">
</p>

<p>
Registration Number:
<input type="text" name="registerNo">
</p>

<p>
Mobile Number:
<input type="text" name="mobileNo">
</p>

<p>
Average CPI:
<input type="number" step="0.01" name="cpi">
</p>

<p>
Experience:
<input type="number" name="experience"> Years
</p>

<p>
<input type="button" value="Verify" onclick="verifyAll()">
<input type="reset" value="Reset">
</p>
</form>

<p id="output" style="color:blue;"></p>

</body>
</html>
